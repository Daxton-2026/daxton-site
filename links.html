<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daxton — Links</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #081a45;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 32px 20px;
    }
    .logo-wrap {
      margin-bottom: 28px;
      text-align: center;
    }
    .logo-wrap img {
      height: 72px;
      width: auto;
    }
    .tagline {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-top: 8px;
      letter-spacing: 0.04em;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
      text-align: center;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }
    .btn-primary {
      background: #fff;
      color: #081a45;
    }
    .btn-amber {
      background: #f5a623;
      color: #081a45;
    }
    .catalogs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .catalog-label {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-top: 4px;
    }
    .btn-catalog {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.2);
      font-size: 14px;
    }
    .btn-catalog:hover { background: rgba(255,255,255,0.18); }
    footer {
      margin-top: 36px;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
